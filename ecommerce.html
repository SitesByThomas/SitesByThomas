<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boutique Luxe</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet" />
</head>
<style>
    :root {
  --fond: #f9f7f3;
  --noir: #111;
  --doré: #d4af37;
  --gris: #777;
  --serif: 'Cormorant Garamond', serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--serif);
  background-color: var(--fond);
  color: var(--noir);
  line-height: 1.6;
  padding: 0 2rem;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2rem 0;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 2px;
}

nav ul {
  display: flex;
  gap: 2rem;
  list-style: none;
}

nav a {
  text-decoration: none;
  color: var(--noir);
  font-size: 1rem;
  transition: color 0.3s;
}

nav a:hover {
  color: var(--doré);
}

.hero {
  text-align: center;
  padding: 0rem 0;
}

.hero h1 {
  font-size: 3rem;
  margin-bottom: 1rem;
}

.hero p {
  font-size: 1.2rem;
  color: var(--gris);
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 3rem;
  padding: 4rem 0;
}

.product-card {
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: pointer;
}

.product-card img {
  width: 90%;
  height: 300px;
  object-fit: cover;
  display: block;
}

.product-card h2 {
  padding: 1rem 1.2rem 0 1.2rem;
  font-size: 1.5rem;
}

.product-card .price {
  padding: 0.5rem 1.2rem 1.5rem;
  font-weight: bold;
  color: var(--doré);
  font-size: 1.2rem;
}

.product-card:hover {
  transform: scale(1.02);
  box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
}

footer {
  text-align: center;
  padding: 2rem 0;
  border-top: 1px solid #ddd;
  color: #aaa;
  font-size: 0.9rem;
}

</style>
<body>
  <header>
    <div class="logo">LUXÉRIA</div>
    <nav>
      <ul>
        <li><a href="#">Accueil</a></li>
        <li><a href="#">Collection</a></li>
        <li><a href="#">Panier</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>Élégance. Pureté. Précision.</h1>
    <p>Découvrez notre sélection de produits d’exception.</p>
  </section>

  <section class="products">
    <div class="product-card">
      <img src="https://i.pinimg.com/originals/f5/64/ec/f564ecd6d19020fe7c5e41e042841e31.jpg" alt="Montre luxe"/>
      <h2>Chaussures De Sport-Prestige</h2>
      <p class="price">€12 900</p>
    </div>
    <div class="product-card">
      <img src="https://th.bing.com/th/id/OIP.PHww8Cq1-V1yP1OzTwHTLwAAAA?rs=1&pid=ImgDetMain&cb=idpwebpc2" alt="Sac cuir"/>
      <h2>Sac Cuir Véritable</h2>
      <p class="price">€5 250</p>
    </div>
    <div class="product-card">
      <img src="moc.png" alt="Chaussures luxe"/>
      <h2>Chaussures Prestige</h2>
      <p class="price">€2 300</p>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 LUXÉRIA  Dévlopé par "SitesbyThomas" — Tous droits réservés.</p>
  </footer>

  <script>// Placeholder for cart interaction later
console.log("E-commerce luxe chargé.");</script>
</body>
</html>
